global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: node
    scrape_interval: 5s
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['app:8080']
